<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Evora - Role Selection</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2D1DB5",
                        "accent": "#FF5F1F",
                        "background-light": "#F7F6FE",
                        "background-dark": "#1a1625",
                        "border-muted": "#E8E4FF",
                        "bg-selected": "#F0EEFF",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "1rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Public Sans', sans-serif;
        }
        .pulse-active {
            box-shadow: 0 0 0 0 rgba(45, 29, 181, 0.4);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(45, 29, 181, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(45, 29, 181, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(45, 29, 181, 0); }
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex items-center justify-center p-4">
<div class="w-full max-w-[480px] flex flex-col gap-8">
<!-- Logo -->
<div class="flex flex-col items-center gap-2">
<div class="text-primary dark:text-slate-100 flex items-center gap-2">
<span class="material-symbols-outlined text-3xl font-bold">diamond</span>
<h1 class="text-2xl font-bold tracking-tight">evora.club</h1>
</div>
</div>
<!-- Onboarding Card -->
<div class="bg-white dark:bg-slate-900 rounded-xl shadow-xl shadow-primary/5 p-8 border border-border-muted dark:border-slate-800">
<!-- Progress Stepper -->
<div class="flex items-center justify-between mb-10 px-4">
<div class="flex flex-col items-center gap-2">
<div class="w-3 h-3 rounded-full bg-primary pulse-active"></div>
<span class="text-[10px] font-bold text-primary uppercase tracking-wider">Role</span>
</div>
<div class="h-[2px] flex-1 bg-border-muted dark:bg-slate-800 mx-2 -mt-4"></div>
<div class="flex flex-col items-center gap-2 opacity-40">
<div class="w-3 h-3 rounded-full bg-slate-300 dark:bg-slate-700"></div>
<span class="text-[10px] font-bold text-slate-500 uppercase tracking-wider">Profile</span>
</div>
<div class="h-[2px] flex-1 bg-border-muted dark:bg-slate-800 mx-2 -mt-4"></div>
<div class="flex flex-col items-center gap-2 opacity-40">
<div class="w-3 h-3 rounded-full bg-slate-300 dark:bg-slate-700"></div>
<span class="text-[10px] font-bold text-slate-500 uppercase tracking-wider">Verify</span>
</div>
<div class="h-[2px] flex-1 bg-border-muted dark:bg-slate-800 mx-2 -mt-4"></div>
<div class="flex flex-col items-center gap-2 opacity-40">
<div class="w-3 h-3 rounded-full bg-slate-300 dark:bg-slate-700"></div>
<span class="text-[10px] font-bold text-slate-500 uppercase tracking-wider">Face</span>
</div>
</div>
<!-- Content -->
<div class="text-center mb-8">
<h2 class="text-2xl font-bold text-slate-900 dark:text-slate-100 mb-2">How do you want to use Evora?</h2>
<p class="text-slate-500 dark:text-slate-400">Choose your primary account type to get started.</p>
</div>
<!-- Selection Options -->
<div class="flex flex-col gap-4">
<!-- Host Option (Selected State Example) -->
<label class="relative flex items-center gap-4 p-5 rounded-xl border-2 border-primary bg-bg-selected dark:bg-primary/10 cursor-pointer group transition-all">
<input checked="" class="hidden" name="role" type="radio" value="host"/>
<div class="flex items-center justify-center w-12 h-12 rounded-full bg-white dark:bg-slate-800 shadow-sm">
<span class="material-symbols-outlined text-primary text-2xl">target</span>
</div>
<div class="flex flex-col flex-1">
<span class="text-lg font-bold text-slate-900 dark:text-slate-100 leading-tight">I want to host</span>
<span class="text-sm text-slate-600 dark:text-slate-400">Create events and manage bookings</span>
</div>
<div class="flex items-center justify-center w-6 h-6 rounded-full bg-primary text-white">
<span class="material-symbols-outlined text-sm font-bold">check</span>
</div>
</label>
<!-- Attendee Option -->
<label class="relative flex items-center gap-4 p-5 rounded-xl border-2 border-border-muted dark:border-slate-800 bg-white dark:bg-slate-900 hover:border-primary/50 cursor-pointer group transition-all">
<input class="hidden" name="role" type="radio" value="join"/>
<div class="flex items-center justify-center w-12 h-12 rounded-full bg-slate-50 dark:bg-slate-800 shadow-sm">
<span class="material-symbols-outlined text-slate-600 dark:text-slate-400 text-2xl">person_raised_hand</span>
</div>
<div class="flex flex-col flex-1">
<span class="text-lg font-bold text-slate-900 dark:text-slate-100 leading-tight">I want to join</span>
<span class="text-sm text-slate-600 dark:text-slate-400">Find and attend exclusive events</span>
</div>
<div class="w-6 h-6 rounded-full border-2 border-border-muted dark:border-slate-800 group-hover:border-primary/30"></div>
</label>
</div>
<!-- Footer Action -->
<div class="mt-10">
<button class="w-full h-14 bg-accent hover:bg-accent/90 text-white font-bold text-lg rounded-xl flex items-center justify-center gap-2 transition-colors shadow-lg shadow-accent/20">
                    Continue
                    <span class="material-symbols-outlined">arrow_forward</span>
</button>
<p class="mt-6 text-center text-xs text-slate-400 dark:text-slate-500">
                    By continuing, you agree to Evora's Terms and Privacy Policy.
                </p>
</div>
</div>
<!-- Help Link -->
<div class="text-center">
<a class="text-sm font-medium text-primary hover:underline flex items-center justify-center gap-1" href="#">
<span class="material-symbols-outlined text-base">help</span>
                Need help choosing?
            </a>
</div>
</div>
</body></html>
