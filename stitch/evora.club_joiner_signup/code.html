<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Joiner Signup | evora.club</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2D1DB5",
                        "accent": "#FF5F1F",
                        "accent-hover": "#FF8C5A",
                        "background-light": "#F7F6FE",
                        "background-dark": "#1A1A2E",
                        "card-bg": "#FFFFFF",
                        "border-color": "#E8E4FF",
                        "text-main": "#1A1A2E",
                        "text-secondary": "#5A5A7A",
                        "text-muted": "#9898B0",
                        "chip-inactive": "#F0EEFF",
                        "whatsapp": "#25D366"
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1.25rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #E8E4FF; border-radius: 10px; }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex items-center justify-center p-4 md:p-8">
<!-- Main Signup Card -->
<div class="w-full max-w-[480px] bg-card-bg dark:bg-slate-900 border border-border-color dark:border-slate-800 rounded-2xl p-10 shadow-sm">
<!-- Header Section -->
<header class="mb-8">
<div class="flex items-center gap-0.5 mb-6">
<span class="text-2xl font-bold tracking-tight text-primary">evora</span>
<span class="text-2xl font-bold tracking-tight text-accent">.club</span>
</div>
<h2 class="text-[28px] font-bold leading-tight text-text-main dark:text-slate-100 mb-2">
                Find your next spontaneous activity
            </h2>
<p class="text-[13px] text-text-muted leading-relaxed">
                Drop your number. We'll WhatsApp you when something fun is happening nearby.
            </p>
</header>
<!-- Form Section -->
<form class="space-y-6">
<!-- Full Name -->
<div class="flex flex-col gap-2">
<label class="text-[13px] font-semibold text-text-secondary dark:text-slate-300">Full Name</label>
<input class="w-full h-12 px-4 rounded-xl border border-border-color dark:border-slate-700 bg-white dark:bg-slate-800 text-text-main dark:text-slate-100 placeholder:text-text-muted focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all" placeholder="Your full name" type="text"/>
</div>
<!-- Phone Number -->
<div class="flex flex-col gap-2">
<label class="text-[13px] font-semibold text-text-secondary dark:text-slate-300">Phone Number</label>
<div class="relative flex items-center">
<span class="absolute left-4 text-text-secondary font-medium">+91</span>
<input class="w-full h-12 pl-14 pr-4 rounded-xl border border-border-color dark:border-slate-700 bg-white dark:bg-slate-800 text-text-main dark:text-slate-100 placeholder:text-text-muted focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all" placeholder="10-digit number" type="tel"/>
</div>
<p class="text-[11px] text-text-muted flex items-center gap-1 mt-1">
<span class="material-symbols-outlined text-[14px]">verified_user</span>
                    We'll send you a WhatsApp message — no spam ever
                </p>
</div>
<!-- Neighbourhood Dropdown -->
<div class="flex flex-col gap-2">
<label class="text-[13px] font-semibold text-text-secondary dark:text-slate-300">Your Neighbourhood</label>
<div class="relative">
<select class="w-full h-12 px-4 appearance-none rounded-xl border border-border-color dark:border-slate-700 bg-white dark:bg-slate-800 text-text-main dark:text-slate-100 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all cursor-pointer">
<option disabled="" selected="" value="">Select area</option>
<option value="koramangala">Koramangala</option>
<option value="hsr">HSR Layout</option>
<option value="indiranagar">Indiranagar</option>
<option value="whitefield">Whitefield</option>
<option value="jayanagar">Jayanagar</option>
<option value="jpnagar">JP Nagar</option>
<option value="other">Other</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-text-muted">expand_more</span>
</div>
</div>
<!-- Interest Chips -->
<div class="flex flex-col gap-3">
<label class="text-[13px] font-semibold text-text-secondary dark:text-slate-300">Pick what you'd join</label>
<div class="grid grid-cols-2 gap-2">
<!-- Active Chip Example -->
<button class="flex items-center justify-center h-10 px-4 rounded-2xl bg-primary text-white text-[13px] font-medium transition-colors" type="button">
                        Sports
                    </button>
<!-- Inactive Chip Example -->
<button class="flex items-center justify-center h-10 px-4 rounded-2xl bg-chip-inactive dark:bg-slate-800 text-text-secondary dark:text-slate-400 text-[13px] font-medium hover:bg-primary/10 transition-colors" type="button">
                        Gaming
                    </button>
<button class="flex items-center justify-center h-10 px-4 rounded-2xl bg-chip-inactive dark:bg-slate-800 text-text-secondary dark:text-slate-400 text-[13px] font-medium hover:bg-primary/10 transition-colors" type="button">
                        Coffee
                    </button>
<button class="flex items-center justify-center h-10 px-4 rounded-2xl bg-chip-inactive dark:bg-slate-800 text-text-secondary dark:text-slate-400 text-[13px] font-medium hover:bg-primary/10 transition-colors" type="button">
                        Food &amp; Cooking
                    </button>
<button class="flex items-center justify-center h-10 px-4 rounded-2xl bg-chip-inactive dark:bg-slate-800 text-text-secondary dark:text-slate-400 text-[13px] font-medium hover:bg-primary/10 transition-colors" type="button">
                        Fitness
                    </button>
<button class="flex items-center justify-center h-10 px-4 rounded-2xl bg-chip-inactive dark:bg-slate-800 text-text-secondary dark:text-slate-400 text-[13px] font-medium hover:bg-primary/10 transition-colors" type="button">
                        Study Together
                    </button>
<button class="flex items-center justify-center h-10 px-4 rounded-2xl bg-chip-inactive dark:bg-slate-800 text-text-secondary dark:text-slate-400 text-[13px] font-medium hover:bg-primary/10 transition-colors" type="button">
                        Music
                    </button>
<button class="flex items-center justify-center h-10 px-4 rounded-2xl bg-chip-inactive dark:bg-slate-800 text-text-secondary dark:text-slate-400 text-[13px] font-medium hover:bg-primary/10 transition-colors" type="button">
                        Creative
                    </button>
</div>
</div>
<!-- Submit Button -->
<button class="w-full h-[52px] bg-accent hover:bg-accent-hover text-white rounded-xl font-bold text-base flex items-center justify-center gap-2 transition-all transform hover:scale-[1.01] active:scale-[0.99] shadow-lg shadow-accent/20 mt-4" type="submit">
                Notify Me via WhatsApp
                <span class="material-symbols-outlined">arrow_forward</span>
</button>
</form>
<!-- Footer inside card -->
<div class="mt-8 pt-6 border-t border-border-color dark:border-slate-800 text-center">
<p class="text-[13px] text-text-secondary dark:text-slate-400">
                Want to host events instead?
            </p>
<a class="inline-block mt-1 text-[13px] font-bold text-primary hover:underline transition-all" href="#">
                Apply as a Founding Host →
            </a>
</div>
</div>
<!-- Floating WhatsApp Button -->
<div class="fixed bottom-6 right-6 group flex items-center gap-3">
<div class="bg-white dark:bg-slate-800 px-4 py-2 rounded-lg shadow-xl border border-border-color dark:border-slate-700 opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none">
<p class="text-sm font-semibold text-text-main dark:text-slate-100 whitespace-nowrap">Chat with us</p>
</div>
<button class="w-14 h-14 bg-whatsapp text-white rounded-full flex items-center justify-center shadow-xl hover:scale-110 transition-transform">
<svg class="w-8 h-8" fill="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"></path>
</svg>
</button>
</div>
</body></html>
