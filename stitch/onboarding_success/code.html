<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2D1DB5",
                        "accent": "#FF5F1F",
                        "background-light": "#F7F6FE",
                        "background-dark": "#1a1166",
                        "success": "#10b981",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Public Sans', sans-serif;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex flex-col items-center justify-center p-4 font-display">
<!-- Main Card Container -->
<div class="w-full max-w-[480px] bg-white dark:bg-slate-900 rounded-xl shadow-xl shadow-primary/5 overflow-hidden border border-primary/10">
<!-- Top Nav / Header Branding -->
<header class="flex items-center justify-between px-8 py-6 border-b border-slate-100 dark:border-slate-800">
<div class="flex items-center gap-2 text-primary dark:text-white">
<div class="size-8 bg-primary rounded-lg flex items-center justify-center text-white">
<span class="material-symbols-outlined text-xl">layers</span>
</div>
<h2 class="text-slate-900 dark:text-white text-xl font-bold tracking-tight">evora.club</h2>
</div>
<div class="text-slate-400">
<span class="material-symbols-outlined">more_horiz</span>
</div>
</header>
<!-- Content Section -->
<div class="flex flex-col items-center px-8 py-12 text-center">
<!-- Visual: Success Mark -->
<div class="relative mb-8">
<div class="size-24 rounded-full bg-success/10 flex items-center justify-center text-success">
<span class="material-symbols-outlined text-5xl font-bold">check_circle</span>
</div>
<!-- Decorative elements to mimic "animated" feel -->
<div class="absolute -top-1 -right-1 size-4 bg-accent rounded-full opacity-20"></div>
<div class="absolute bottom-2 -left-4 size-3 bg-primary rounded-full opacity-20"></div>
</div>
<!-- Badge -->
<div class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full bg-success/10 text-success text-xs font-bold uppercase tracking-wider mb-6">
<span class="material-symbols-outlined text-sm">verified</span>
                Verified
            </div>
<!-- Headline -->
<h1 class="text-slate-900 dark:text-white text-3xl font-extrabold leading-tight mb-4">
                You're all set! 🎉
            </h1>
<!-- Description -->
<p class="text-slate-500 dark:text-slate-400 text-lg leading-relaxed mb-10 max-w-[320px] mx-auto">
                Your account is ready. Welcome to the exclusive community at evora.club.
            </p>
<!-- Card UI Fragment (Dashboard Preview) -->
<div class="w-full bg-slate-50 dark:bg-slate-800/50 rounded-xl p-4 mb-10 border border-slate-100 dark:border-slate-800 flex items-center gap-4 text-left">
<div class="size-12 rounded-lg bg-white dark:bg-slate-700 shadow-sm flex items-center justify-center">
<span class="material-symbols-outlined text-primary">account_balance_wallet</span>
</div>
<div>
<div class="text-xs text-slate-400 font-medium">NEXT STEP</div>
<div class="text-sm font-semibold text-slate-700 dark:text-slate-200">Connect your digital wallet</div>
</div>
<div class="ml-auto">
<span class="material-symbols-outlined text-slate-300">chevron_right</span>
</div>
</div>
<!-- CTA Button -->
<a class="w-full bg-accent hover:bg-accent/90 text-white font-bold py-4 px-6 rounded-xl flex items-center justify-center gap-2 transition-all shadow-lg shadow-accent/20 group" href="#">
                Go to your dashboard
                <span class="material-symbols-outlined transition-transform group-hover:translate-x-1">arrow_forward</span>
</a>
<!-- Secondary Action -->
<button class="mt-6 text-slate-400 hover:text-primary text-sm font-medium transition-colors">
                View profile settings
            </button>
</div>
<!-- Footer Decoration -->
<div class="h-1.5 w-full bg-gradient-to-r from-primary via-accent to-primary"></div>
</div>
<!-- Background Decoration (Abstract Shapes) -->
<div class="fixed top-0 left-0 w-full h-full -z-10 overflow-hidden pointer-events-none opacity-40">
<div class="absolute -top-[10%] -left-[10%] size-[400px] bg-primary/10 rounded-full blur-3xl"></div>
<div class="absolute -bottom-[10%] -right-[10%] size-[400px] bg-accent/10 rounded-full blur-3xl"></div>
</div>
</body></html>
